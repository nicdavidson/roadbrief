server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml image/svg+xml;
    gzip_min_length 256;

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend via fly.io internal networking
    location /api/ {
        # Replace with your actual backend app name on fly.io
        set $backend "roadbrief-api.internal";  # fly.io internal DNS — change to your backend app name

        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;

        # Preserve headers for auth
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout for routing requests (can be slow)
        proxy_read_timeout 60s;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store";
    }

    # Mapbox GL JS assets (if using mapbox token)
    location ~* /assets/mapbox/ {
        expires 1y;
        add_header Cache-Control "public";
    }
}

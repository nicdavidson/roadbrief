server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml image/svg+xml;
    gzip_min_length 256;

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/security-headers.conf;
    }

    # Proxy API calls to backend via fly.io internal networking
    location /api/ {
        set $backend "roadbrief-api.internal";

        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;

        proxy_read_timeout 60s;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/security-headers.conf;
    }

    # Don't cache index.html (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store" always;
        include /etc/nginx/security-headers.conf;
    }

    # Mapbox GL JS assets
    location ~* /assets/mapbox/ {
        expires 1y;
        add_header Cache-Control "public" always;
        include /etc/nginx/security-headers.conf;
    }
}

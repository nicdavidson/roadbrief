app = "roadbrief-api"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 10

[[services.ports]]
  handlers = ["http"]
  port = 80
  force_https = true

[[services.ports]]
  handlers = ["tls", "websocket"]
  port = 443

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 256

[deploy]
  strategy = "canary"
  max_unavailable = 1
